<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Acceso</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        /* Reseteo y estilos base */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        /* Tarjeta principal */
        .card { 
            background: #1e293b; 
            padding: 2.5rem 2rem; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.25); 
            width: 100%; 
            max-width: 360px; 
            text-align: center; 
        }
        
        .card h2 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        .card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

        /* Botón de Telegram moderno */
        .tg-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            background: #24A1DE; 
            color: #ffffff; 
            text-decoration: none; 
            padding: 0.85rem 1.5rem; 
            border-radius: 10px; 
            font-weight: 600; 
            font-size: 1rem; 
            width: 100%; 
            opacity: 0; 
            visibility: hidden;
            transform: translateY(15px); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-top: 1.5rem;
        }
        .tg-btn.active { 
            opacity: 1; 
            visibility: visible;
            transform: translateY(0); 
        }
        .tg-btn:hover { background: #1f8ec4; transform: translateY(-2px); }
        .tg-btn:active { transform: translateY(0); }
        
        .tg-icon { width: 24px; height: 24px; fill: currentColor; }

        /* Alerta de error */
        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Verificación</h2>
        <p>Demuestra que eres humano para acceder al canal.</p>
        
        <div class="cf-turnstile" 
             data-sitekey="0x4AAAAAADvwLz7Z5Dzu36tZ" 
             data-callback="verificacionExitosa" 
             data-theme="dark"
             style="display: flex; justify-content: center;">
        </div>

        <div id="errorBox" class="error-msg">La verificación falló. Por favor, inténtalo de nuevo.</div>

        <a href="#" target="_blank" class="tg-btn" id="tgBtn">
            <svg class="tg-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.233-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.123-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.432.893-.645 3.501-1.524 5.836-2.529 7.005-3.013 3.33-1.381 4.022-1.621 4.475-1.63z"/>
            </svg>
            Entrar al Canal
        </a>
    </div>

    <script>
        async function verificacionExitosa(token) {
            const tgBtn = document.getElementById('tgBtn');
            const errorBox = document.getElementById('errorBox');
            errorBox.style.display = 'none';

            try {
                // Enviamos el token generado a nuestra Page Function interna
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });

                const data = await response.json();

                if (data.success) {
                    // Recibimos el enlace seguro desde el backend y activamos el botón
                    tgBtn.href = data.url;
                    tgBtn.classList.add('active');
                } else {
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                console.error("Error en la comunicación con el servidor:", err);
                errorBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
