<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Acceso</title>
    <style>
        /* Reseteo y estilos base */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        /* Tarjeta principal */
        .card { 
            background: #1e293b; 
            padding: 2.5rem 2rem; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.25); 
            width: 100%; 
            max-width: 360px; 
            text-align: center; 
        }
        
        .card h2 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        .card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

        /* Contenedor del Captcha falso */
        .verify-container { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #0f172a; 
            padding: 1rem 1.25rem; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            margin-bottom: 1.5rem; 
            user-select: none;
        }
        .verify-container:hover { border-color: #475569; }
        .verify-container.success { border-color: #22c55e; cursor: default; }

        /* Elementos del Captcha */
        .verify-left { display: flex; align-items: center; gap: 12px; }
        
        .checkbox { 
            width: 22px; 
            height: 22px; 
            border: 2px solid #64748b; 
            border-radius: 4px; 
            display: inline-flex; 
            transition: all 0.2s; 
        }
        .verify-container:hover .checkbox { border-color: #94a3b8; }
        
        .verify-text { font-weight: 500; font-size: 0.95rem; }
        
        .shield-icon { width: 28px; height: 28px; stroke: #475569; }

        /* Animación de Carga */
        .loader { 
            border: 3px solid transparent; 
            border-top: 3px solid #38bdf8; 
            border-radius: 50%; 
            width: 22px; 
            height: 22px; 
            animation: spin 1s linear infinite; 
            display: none; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Icono de check (Éxito) */
        .checkmark { 
            display: none; 
            width: 22px; 
            height: 22px; 
            fill: none; 
            stroke: #22c55e; 
            stroke-width: 3; 
            stroke-linecap: round; 
            stroke-linejoin: round; 
        }

        /* Botón de Telegram */
        .tg-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            background: #24A1DE; /* Azul oficial de Telegram */
            color: #ffffff; 
            text-decoration: none; 
            padding: 0.85rem 1.5rem; 
            border-radius: 10px; 
            font-weight: 600; 
            font-size: 1rem; 
            width: 100%; 
            opacity: 0; 
            visibility: hidden;
            transform: translateY(15px); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .tg-btn.active { 
            opacity: 1; 
            visibility: visible;
            transform: translateY(0); 
        }
        .tg-btn:hover { background: #1f8ec4; transform: translateY(-2px); }
        .tg-btn:active { transform: translateY(0); }
        
        .tg-icon { width: 24px; height: 24px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Verificación</h2>
        <p>Demuestra que eres humano para acceder al canal.</p>
        
        <div class="verify-container" id="verifyBox" onclick="verifyHuman()">
            <div class="verify-left">
                <div class="checkbox" id="checkbox"></div>
                <div class="loader" id="loader"></div>
                <svg class="checkmark" id="checkmark" viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span class="verify-text" id="verifyText">Soy humano</span>
            </div>
            
            <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </div>

        <a href="https://t.me/UnitedofBinners" target="_blank" class="tg-btn" id="tgBtn">
            <svg class="tg-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.233-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.123-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.432.893-.645 3.501-1.524 5.836-2.529 7.005-3.013 3.33-1.381 4.022-1.621 4.475-1.63z"/>
            </svg>
            Entrar al Canal
        </a>
    </div>

    <script>
        let isVerified = false;

        function verifyHuman() {
            // Evitar que se ejecute más de una vez
            if (isVerified) return;
            
            const verifyBox = document.getElementById('verifyBox');
            const checkbox = document.getElementById('checkbox');
            const loader = document.getElementById('loader');
            const checkmark = document.getElementById('checkmark');
            const verifyText = document.getElementById('verifyText');
            const tgBtn = document.getElementById('tgBtn');

            // 1. Iniciar estado de carga
            checkbox.style.display = 'none';
            loader.style.display = 'block';
            verifyText.innerText = 'Comprobando...';
            verifyBox.style.cursor = 'wait';

            // 2. Simular el tiempo de verificación (1.5 segundos)
            setTimeout(() => {
                // Cambiar a estado exitoso
                loader.style.display = 'none';
                checkmark.style.display = 'block';
                verifyText.innerText = '¡Éxito!';
                
                verifyBox.classList.add('success');
                isVerified = true;
                
                // 3. Mostrar el botón de Telegram medio segundo después
                setTimeout(() => {
                    tgBtn.classList.add('active');
                }, 400);

            }, 1500); // 1500 ms = 1.5 segundos
        }
    </script>
</body>
</html>
